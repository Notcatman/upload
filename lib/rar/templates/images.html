<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
</head>
<style>
    @keyframes opacity {
        0%{
            transform: translateY(-20px);
            opacity: 0;


        }
        100%{
            transform: translateY(0px);
            opacity: 1;
        }
    }


    *::selection{
        background-color: hsl(323, 71%, 50%);
    }

    body{
        background: linear-gradient(90deg, hsla(316, 24%, 91%, 0.537), hsla(55, 8%, 74%, 0.532));
        animation: opacity 1.5s ease;
    }

    .photo-container {

        max-width: 800px;
        margin: 70px auto;
        padding: 20px;
        text-align: center;
    }
    .main-img {
        max-width: 100%;
        height: auto;
       
    }
    .badge {
        background-color: hsl(319, 90%, 66%);
        color: hsl(0, 0%, 100%);
        padding: 5px 10px;
    }
</style>
<body>

    <div class="photo-container">
        <h1 style="font-family: sans-serif;">{{ photo.title }}</h1>
        <span class="badge">{{ photo.category.name }}</span>
        
        <div style="margin: 20px 0;">
            <img src="{{ photo.image.url }}" class="main-img" alt="{{ photo.title }}">
        </div>

        <p>{{ photo.description }}</p>
        <p style="font-family:Arial">Uploaded on: {{ photo.uploaded_at|date:"F j, Y" }}</p>
        
    </div>

        {% endfor %}
    </div> -->
</body>
</html>
